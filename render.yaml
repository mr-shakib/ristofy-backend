services:
  - type: web
    name: ristofy-backend
    env: python
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 60
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ristofy-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-domain.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-frontend-domain.com
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: LOG_LEVEL
        value: INFO
      - key: THROTTLE_AUTH_LOGIN
        value: 10/minute
      - key: THROTTLE_PIN_LOGIN
        value: 10/minute
      - key: THROTTLE_BURST
        value: 120/minute
      - key: THROTTLE_SUSTAINED
        value: 5000/day
